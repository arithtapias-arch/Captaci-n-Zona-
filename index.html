<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Captación de Zona</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Captación">
<meta name="theme-color" content="#232E3B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1EDE1;
    --bg-line:#D8D0BA;
    --ink:#232E3B;
    --ink-soft:#5B6472;
    --paper:#FAF7EE;
    --brick:#A8462E;
    --green:#4C6650;
    --mustard:#B4821F;
    --blue:#3A5A73;
    --grey:#8A8375;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 27px, var(--bg-line) 27px, var(--bg-line) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, var(--bg-line) 27px, var(--bg-line) 28px),
      var(--bg);
    background-attachment: local;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:60px;
  }
  header{
    padding:28px 20px 18px;
    border-bottom:3px solid var(--ink);
    background:var(--bg);
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--brick);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  h1{
    font-family:'Bitter', serif;
    font-weight:700;
    font-size:28px;
    margin:0 0 2px;
    letter-spacing:-0.3px;
  }
  .subtitle{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:16px;
  }
  .stats{
    display:flex;
    gap:0;
    border:1.5px solid var(--ink);
    background:var(--paper);
  }
  .stat{
    flex:1;
    padding:10px 8px;
    text-align:center;
    border-right:1.5px solid var(--ink);
  }
  .stat:last-child{border-right:none;}
  .stat .num{
    font-family:'IBM Plex Mono', monospace;
    font-size:20px;
    font-weight:500;
    display:block;
  }
  .stat .lbl{
    font-size:9px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
  }

  main{max-width:640px; margin:0 auto; padding:0 16px;}

  .toolbar{
    display:flex;
    gap:8px;
    margin:18px 0 14px;
  }
  .toolbar input, .toolbar select{
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:9px 10px;
    border:1.5px solid var(--ink);
    background:var(--paper);
    border-radius:var(--radius);
  }
  .toolbar input[type="text"]{flex:1; min-width:0;}
  .toolbar select{flex:0 0 auto;}

  button{
    font-family:'Inter', sans-serif;
    cursor:pointer;
  }
  .btn-primary{
    width:100%;
    background:var(--ink);
    color:var(--paper);
    border:none;
    padding:13px;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.3px;
    border-radius:var(--radius);
    margin-bottom:10px;
  }
  .btn-primary:active{background:var(--brick);}

  .btn-secondary{
    background:transparent;
    border:1.5px solid var(--ink);
    color:var(--ink);
    padding:8px 12px;
    font-size:12px;
    font-weight:500;
    border-radius:var(--radius);
  }

  /* Form */
  .form-card{
    background:var(--paper);
    border:1.5px solid var(--ink);
    padding:16px;
    margin-bottom:16px;
    display:none;
  }
  .form-card.open{display:block;}
  .form-title{
    font-family:'Bitter', serif;
    font-weight:600;
    font-size:15px;
    margin:0 0 12px;
    padding-bottom:8px;
    border-bottom:1px solid var(--bg-line);
  }
  .row{display:flex; gap:8px; margin-bottom:10px;}
  .field{flex:1; display:flex; flex-direction:column; gap:4px;}
  .field.small{flex:0 0 78px;}
  label{
    font-size:10px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:500;
  }
  input, select, textarea{
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:8px 9px;
    border:1px solid #B9B2A0;
    background:#fff;
    border-radius:var(--radius);
    width:100%;
  }
  textarea{resize:vertical; min-height:50px; font-family:'Inter', sans-serif;}
  .form-actions{display:flex; gap:8px; margin-top:4px;}
  .form-actions .btn-primary{margin-bottom:0;}
  .form-actions .cancel{
    flex:0 0 auto;
    background:transparent;
    border:1.5px solid var(--grey);
    color:var(--ink-soft);
    padding:10px 16px;
    border-radius:var(--radius);
    font-size:13px;
  }

  /* Entry cards - "ficha" */
  .entry{
    position:relative;
    background:var(--paper);
    border:1.5px solid var(--ink);
    padding:14px 14px 12px;
    margin-bottom:12px;
  }
  .entry-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .entry-addr{
    font-family:'Bitter', serif;
    font-weight:700;
    font-size:16px;
    line-height:1.25;
  }
  .entry-name{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .stamp{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    border:1.5px solid;
    padding:4px 8px;
    white-space:nowrap;
    transform:rotate(-3deg);
    border-radius:3px;
    flex-shrink:0;
  }
  .stamp.pendiente{color:var(--grey); border-color:var(--grey);}
  .stamp.no-en-casa{color:var(--mustard); border-color:var(--mustard);}
  .stamp.interesado{color:var(--green); border-color:var(--green); transform:rotate(-3deg) scale(1.02);}
  .stamp.no-interesado{color:var(--brick); border-color:var(--brick);}
  .stamp.volver{color:var(--blue); border-color:var(--blue);}

  .entry-meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:8px;
  }
  .entry-notes{
    font-size:13px;
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed var(--bg-line);
    line-height:1.4;
  }
  .entry-actions{
    display:flex;
    gap:12px;
    margin-top:10px;
  }
  .entry-actions button{
    background:none;
    border:none;
    font-size:11px;
    letter-spacing:0.3px;
    text-transform:uppercase;
    color:var(--ink-soft);
    text-decoration:underline;
    padding:0;
  }
  .entry-actions button.delete{color:var(--brick);}

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
    font-size:14px;
  }
  .empty .big{
    font-family:'Bitter', serif;
    font-size:18px;
    color:var(--ink);
    margin-bottom:6px;
  }

  .loading{padding:40px; text-align:center; color:var(--ink-soft); font-size:13px;}

  .toast{
    position:fixed;
    left:16px; right:16px; bottom:16px;
    background:var(--ink);
    color:#fff;
    padding:12px 14px;
    border-radius:var(--radius);
    font-size:13px;
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    z-index:50;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .toast.show{display:flex;}
  .toast.err{background:var(--brick);}
  .toast button{
    background:none;
    border:1px solid rgba(255,255,255,0.5);
    color:#fff;
    font-size:11px;
    padding:5px 9px;
    border-radius:var(--radius);
    flex-shrink:0;
  }

  .view-toggle{display:flex; gap:6px; margin-bottom:12px;}
  .view-toggle button{
    flex:1;
    padding:8px;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.3px;
    text-transform:uppercase;
    border:1.5px solid var(--ink);
    background:var(--paper);
    color:var(--ink);
    border-radius:var(--radius);
  }
  .view-toggle button.active{background:var(--ink); color:var(--paper);}

  .reminders{
    border:1.5px solid var(--brick);
    background:#F7ECE6;
    padding:12px 14px;
    margin-bottom:14px;
  }
  .reminders-title{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--brick);
    margin-bottom:8px;
    font-weight:500;
  }
  .reminder-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    border-top:1px dashed #DCC3B8;
    font-size:13px;
  }
  .reminder-item:first-child{border-top:none;}
  .reminder-item .r-addr{font-weight:600;}
  .reminder-item .r-date{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--brick);
  }

  .entry.due{border-color:var(--brick); box-shadow:inset 3px 0 0 var(--brick);}

  .street-group{margin-bottom:16px;}
  .street-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:6px 2px;
    border-bottom:2px solid var(--ink);
    margin-bottom:8px;
  }
  .street-head .name{
    font-family:'Bitter', serif;
    font-weight:700;
    font-size:16px;
  }
  .street-head .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }
  .street-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:7px 4px;
    border-bottom:1px solid var(--bg-line);
    font-size:13px;
  }
  .street-row .portal{font-family:'IBM Plex Mono', monospace; color:var(--ink-soft); font-size:12px;}
  .street-row .dot{
    display:inline-block;
    width:8px; height:8px;
    border-radius:50%;
    margin-right:6px;
    flex-shrink:0;
  }
  .dot.pendiente{background:var(--grey);}
  .dot.no-en-casa{background:var(--mustard);}
  .dot.interesado{background:var(--green);}
  .dot.no-interesado{background:var(--brick);}
  .dot.volver{background:var(--blue);}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Libro de registro &mdash; captación puerta a puerta</div>
  <h1>Captación de Zona</h1>
  <div class="subtitle">Guarda cada visita: dirección, contacto y resultado</div>
  <div class="stats" id="stats">
    <div class="stat"><span class="num">0</span><span class="lbl">Fincas</span></div>
    <div class="stat"><span class="num">0</span><span class="lbl">Interesados</span></div>
    <div class="stat"><span class="num">0</span><span class="lbl">Hoy</span></div>
    <div class="stat"><span class="num">0</span><span class="lbl">Por volver</span></div>
  </div>
</header>

<main>
  <button class="btn-primary" id="toggleForm" style="margin-top:16px;">+ Nueva ficha</button>

  <div class="form-card" id="formCard">
    <div class="form-title" id="formTitle">Nueva ficha</div>
    <div class="row">
      <div class="field">
        <label>Nombre</label>
        <input type="text" id="f-nombre" placeholder="Nombre del vecino/a">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Calle</label>
        <input type="text" id="f-calle" placeholder="Calle">
      </div>
      <div class="field small">
        <label>Nº finca</label>
        <input type="text" id="f-numero" placeholder="24">
      </div>
    </div>
    <div class="row">
      <div class="field small">
        <label>Piso</label>
        <input type="text" id="f-piso" placeholder="3">
      </div>
      <div class="field small">
        <label>Puerta</label>
        <input type="text" id="f-puerta" placeholder="2ª">
      </div>
      <div class="field">
        <label>Teléfono (opc.)</label>
        <input type="text" id="f-telefono" placeholder="600 000 000">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Estado</label>
        <select id="f-estado">
          <option value="pendiente">Pendiente</option>
          <option value="no-en-casa">No estaba en casa</option>
          <option value="interesado">Interesado</option>
          <option value="no-interesado">No interesado</option>
          <option value="volver">Volver a visitar</option>
        </select>
      </div>
      <div class="field">
        <label>Recordatorio (opc.)</label>
        <input type="date" id="f-recordatorio">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Notas</label>
        <textarea id="f-notas" placeholder="Detalles de la conversación, mejor horario para volver, etc."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="cancel" id="cancelForm">Cancelar</button>
      <button class="btn-primary" id="saveEntry">Guardar ficha</button>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar por calle o nombre...">
    <select id="filterEstado">
      <option value="">Todos</option>
      <option value="pendiente">Pendiente</option>
      <option value="no-en-casa">No en casa</option>
      <option value="interesado">Interesado</option>
      <option value="no-interesado">No interesado</option>
      <option value="volver">Volver</option>
    </select>
  </div>

  <div class="view-toggle">
    <button id="viewList" class="active">Lista</button>
    <button id="viewStreets">Por calles</button>
  </div>

  <div id="reminders"></div>

  <div id="list" class="loading">Cargando fichas...</div>

  <div style="display:flex; gap:8px; margin-top:6px;">
    <button class="btn-secondary" id="exportBtn" style="flex:1;">Exportar CSV</button>
    <button class="btn-secondary" id="backupBtn" style="flex:1;">Descargar copia</button>
  </div>
  <button class="btn-secondary" id="restoreBtn" style="width:100%; margin-top:8px;">Restaurar copia</button>
  <input type="file" id="restoreFile" accept="application/json" style="display:none;">
</main>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
</div>

<script>
const STORAGE_KEY = 'captacion-zona-fichas';
let entries = [];
let editingId = null;
let viewMode = 'list';

const estadoLabels = {
  'pendiente': 'Pendiente',
  'no-en-casa': 'No en casa',
  'interesado': 'Interesado',
  'no-interesado': 'No interesado',
  'volver': 'Volver a visitar'
};

function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function todayISO(){
  return new Date().toISOString().slice(0,10);
}

function showToast(msg){
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2200);
}

function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){
    console.error('Error cargando', e);
    entries = [];
  }
  render();
}

function saveEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    return true;
  }catch(e){
    console.error('Error guardando', e);
    alert('No se pudo guardar en este navegador. Si el almacenamiento está lleno o en modo privado, usa "Descargar copia" para no perder tus fichas.');
    return false;
  }
}

function openForm(entry){
  document.getElementById('formCard').classList.add('open');
  document.getElementById('toggleForm').style.display = 'none';
  if(entry){
    editingId = entry.id;
    document.getElementById('formTitle').textContent = 'Editar ficha';
    document.getElementById('f-nombre').value = entry.nombre || '';
    document.getElementById('f-calle').value = entry.calle || '';
    document.getElementById('f-numero').value = entry.numero || '';
    document.getElementById('f-piso').value = entry.piso || '';
    document.getElementById('f-puerta').value = entry.puerta || '';
    document.getElementById('f-telefono').value = entry.telefono || '';
    document.getElementById('f-estado').value = entry.estado || 'pendiente';
    document.getElementById('f-recordatorio').value = entry.recordatorio || '';
    document.getElementById('f-notas').value = entry.notas || '';
  } else {
    editingId = null;
    document.getElementById('formTitle').textContent = 'Nueva ficha';
    ['f-nombre','f-calle','f-numero','f-piso','f-puerta','f-telefono','f-notas','f-recordatorio'].forEach(id=>{
      document.getElementById(id).value = '';
    });
    document.getElementById('f-estado').value = 'pendiente';
  }
}

function closeForm(){
  document.getElementById('formCard').classList.remove('open');
  document.getElementById('toggleForm').style.display = 'block';
  editingId = null;
}

document.getElementById('toggleForm').addEventListener('click', ()=>openForm(null));
document.getElementById('cancelForm').addEventListener('click', closeForm);

document.getElementById('saveEntry').addEventListener('click', async ()=>{
  const calle = document.getElementById('f-calle').value.trim();
  if(!calle){
    document.getElementById('f-calle').focus();
    return;
  }
  const data = {
    nombre: document.getElementById('f-nombre').value.trim(),
    calle: calle,
    numero: document.getElementById('f-numero').value.trim(),
    piso: document.getElementById('f-piso').value.trim(),
    puerta: document.getElementById('f-puerta').value.trim(),
    telefono: document.getElementById('f-telefono').value.trim(),
    estado: document.getElementById('f-estado').value,
    recordatorio: document.getElementById('f-recordatorio').value,
    notas: document.getElementById('f-notas').value.trim(),
  };

  if(editingId){
    const idx = entries.findIndex(e=>e.id===editingId);
    if(idx>-1){
      entries[idx] = {...entries[idx], ...data};
    }
  } else {
    entries.unshift({
      id: 'e'+Date.now()+Math.random().toString(36).slice(2,7),
      fecha: todayStr(),
      fechaISO: new Date().toISOString().slice(0,10),
      ...data
    });
  }
  await saveEntries();
  closeForm();
  render();
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterEstado').addEventListener('change', render);
document.getElementById('viewList').addEventListener('click', ()=>{
  viewMode = 'list';
  document.getElementById('viewList').classList.add('active');
  document.getElementById('viewStreets').classList.remove('active');
  render();
});
document.getElementById('viewStreets').addEventListener('click', ()=>{
  viewMode = 'streets';
  document.getElementById('viewStreets').classList.add('active');
  document.getElementById('viewList').classList.remove('active');
  render();
});

document.getElementById('list').addEventListener('click', async (e)=>{
  const editBtn = e.target.closest('.edit');
  const delBtn = e.target.closest('.delete');
  if(editBtn){
    const id = editBtn.dataset.id;
    const entry = entries.find(x=>x.id===id);
    if(entry) openForm(entry);
    window.scrollTo({top:0, behavior:'smooth'});
  }
  if(delBtn){
    const id = delBtn.dataset.id;
    entries = entries.filter(x=>x.id!==id);
    await saveEntries();
    render();
  }
});

document.getElementById('backupBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `captacion-zona-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Copia descargada ✓');
});

document.getElementById('restoreBtn').addEventListener('click', ()=>{
  document.getElementById('restoreFile').click();
});

document.getElementById('restoreFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!Array.isArray(parsed)) throw new Error('formato inválido');
      const existingIds = new Set(entries.map(x=>x.id));
      const merged = parsed.filter(p => p && p.id && !existingIds.has(p.id));
      entries = [...merged, ...entries];
      saveEntries();
      render();
      alert(`Copia restaurada: ${merged.length} ficha(s) añadida(s).`);
    }catch(err){
      alert('No se pudo leer ese archivo. Comprueba que sea una copia exportada desde aquí (.json).');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const headers = ['Fecha','Nombre','Calle','Nº Finca','Piso','Puerta','Teléfono','Estado','Notas'];
  const rows = entries.map(en=>[
    en.fecha, en.nombre, en.calle, en.numero, en.piso, en.puerta, en.telefono, estadoLabels[en.estado]||en.estado, (en.notas||'').replace(/\n/g,' ')
  ]);
  const csv = [headers, ...rows].map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `captacion-zona-${todayISO()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('CSV descargado ✓');
});

function renderReminders(){
  const iso = todayISO();
  const due = entries
    .filter(e => e.recordatorio && e.recordatorio <= iso)
    .sort((a,b) => a.recordatorio.localeCompare(b.recordatorio));
  const box = document.getElementById('reminders');
  if(due.length === 0){ box.innerHTML = ''; return; }
  box.innerHTML = `
    <div class="reminders">
      <div class="reminders-title">A revisitar (${due.length})</div>
      ${due.map(en => {
        const overdue = en.recordatorio < iso;
        const [y,m,d] = en.recordatorio.split('-');
        return `<div class="reminder-item">
          <span class="r-addr">${escapeHtml(en.calle)}${en.numero ? ', '+escapeHtml(en.numero) : ''}${en.nombre ? ' · '+escapeHtml(en.nombre) : ''}</span>
          <span class="r-date">${overdue ? 'venció ' : ''}${d}/${m}/${y}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function render(){
  const search = document.getElementById('search').value.toLowerCase();
  const filterEstado = document.getElementById('filterEstado').value;
  const iso = todayISO();

  let filtered = entries.filter(en=>{
    const matchSearch = !search ||
      (en.calle||'').toLowerCase().includes(search) ||
      (en.nombre||'').toLowerCase().includes(search);
    const matchEstado = !filterEstado || en.estado === filterEstado;
    return matchSearch && matchEstado;
  });

  // Stats
  const today = todayStr();
  const totalFincas = entries.length;
  const interesados = entries.filter(e=>e.estado==='interesado').length;
  const hoy = entries.filter(e=>e.fecha===today).length;
  const volver = entries.filter(e=>e.estado==='volver').length;
  const statNums = document.querySelectorAll('.stat .num');
  statNums[0].textContent = totalFincas;
  statNums[1].textContent = interesados;
  statNums[2].textContent = hoy;
  statNums[3].textContent = volver;

  renderReminders();

  const list = document.getElementById('list');
  list.classList.remove('loading');

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">
      <div class="big">${entries.length===0 ? 'Aún no hay fichas' : 'Sin resultados'}</div>
      <div>${entries.length===0 ? 'Añade tu primera visita con "+ Nueva ficha"' : 'Prueba a cambiar la búsqueda o el filtro'}</div>
    </div>`;
    return;
  }

  if(viewMode === 'streets'){
    renderStreets(filtered);
  } else {
    renderList(filtered, iso);
  }
}

function renderList(filtered, iso){
  const list = document.getElementById('list');
  list.innerHTML = filtered.map(en=>{
    const ubic = [en.numero ? `Nº ${en.numero}` : '', en.piso ? `${en.piso}º` : '', en.puerta || ''].filter(Boolean).join(' · ');
    const isDue = en.recordatorio && en.recordatorio <= iso;
    return `
    <div class="entry ${isDue ? 'due' : ''}">
      <div class="entry-top">
        <div>
          <div class="entry-addr">${escapeHtml(en.calle)}${en.numero ? ', '+escapeHtml(en.numero) : ''}</div>
          ${en.nombre ? `<div class="entry-name">${escapeHtml(en.nombre)}</div>` : ''}
        </div>
        <div class="stamp ${en.estado}">${estadoLabels[en.estado] || en.estado}</div>
      </div>
      <div class="entry-meta">${ubic ? ubic + ' &nbsp;·&nbsp; ' : ''}${en.fecha}${en.telefono ? ' &nbsp;·&nbsp; '+escapeHtml(en.telefono) : ''}</div>
      ${en.notas ? `<div class="entry-notes">${escapeHtml(en.notas)}</div>` : ''}
      <div class="entry-actions">
        <button class="edit" data-id="${en.id}">Editar</button>
        <button class="delete" data-id="${en.id}">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

function renderStreets(filtered){
  const list = document.getElementById('list');
  const groups = {};
  filtered.forEach(en=>{
    const key = en.calle || 'Sin calle';
    if(!groups[key]) groups[key] = [];
    groups[key].push(en);
  });
  const streetNames = Object.keys(groups).sort((a,b)=>a.localeCompare(b, 'es'));

  list.innerHTML = streetNames.map(name=>{
    const items = groups[name].sort((a,b)=>{
      const na = parseInt(a.numero) || 0, nb = parseInt(b.numero) || 0;
      return na - nb;
    });
    return `
    <div class="street-group">
      <div class="street-head">
        <span class="name">${escapeHtml(name)}</span>
        <span class="count">${items.length} ficha${items.length===1?'':'s'}</span>
      </div>
      ${items.map(en=>`
        <div class="street-row edit" data-id="${en.id}">
          <span><span class="dot ${en.estado}"></span>${en.numero ? 'Nº '+escapeHtml(en.numero) : 'Sin número'}${en.piso ? ', '+escapeHtml(en.piso)+'º' : ''}${en.puerta ? ' '+escapeHtml(en.puerta) : ''}${en.nombre ? ' — '+escapeHtml(en.nombre) : ''}</span>
          <span class="portal">${estadoLabels[en.estado]||''}</span>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

function escapeHtml(str){
  if(!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadEntries();
</script>
